const { useState, useRef, useEffect, useMemo, useCallback } = React;

/* ── Per-field configuration ── */
const FIELDS = {
  hos: {
    label: "History of Science",
    title: "History of Modern Science Generals Books",
    booksFile: "data/hos_books.csv",
    connsFile: "data/hos_connections.csv",
    currents: {
      epistemology:  { label: "Epistemology",              color: "#b45309" },
      construction:  { label: "Social Construction & SSK", color: "#dc2626" },
      material:      { label: "Tools & Material Culture",  color: "#2563eb" },

      bodies:        { label: "Bodies, Gender & Exclusion", color: "#a21caf" },

  hot: {

    booksFile: "data/hot_books.csv",

    currents: {
      determinism:    { label: "Determinism & Agency",    color: "#dc2626" },
      systems:        { label: "Systems & Infrastructure", color: "#4338ca" },
      capitalism:     { label: "Capitalism & Labor",      color: "#b45309" },
      innovation:     { label: "Innovation & Users",      color: "#0d9488" },
      computing:      { label: "Computing & AI",          color: "#2563eb" },
      communication:  { label: "Communication & Media",   color: "#ea580c" },
      environment:    { label: "Environment & Nature",    color: "#15803d" },
      gender:         { label: "Gender & Exclusion",      color: "#a21caf" },
      coldwar:        { label: "Cold War & Military",     color: "#64748b" },
      quantification: { label: "Quantification & Data",   color: "#7c3aed" },
    },
    waves: [],
  },
  urban: {
    label: "Urban History",
    title: "Urban History Generals Books",
    booksFile: "data/urban_books.csv",
    connsFile: "data/urban_connections.csv",
    currents: {
      foundations:       { label: "Foundations",              color: "#b45309" },
      political_economy: { label: "Political Economy",       color: "#dc2626" },
      suburbs:           { label: "Suburbs & Sprawl",        color: "#2563eb" },
      race:              { label: "Race & Segregation",       color: "#4338ca" },
      community:         { label: "Community & Culture",      color: "#0d9488" },
      built_environment: { label: "Built Environment",        color: "#ea580c" },
      environment:       { label: "Environment & Nature",     color: "#15803d" },
    },
    waves: [],
  },
};

/* ── Label collision solver ── */
function solveLabels(nodes, dims) {
  const fontSize = 8;
  const charW = fontSize * 0.62;
  const labels = nodes.map(n => ({
    id: n.id, ox: n.x, oy: n.y,
    x: n.x + 7, y: n.y,
    w: n.a.length * charW + 6, h: fontSize + 3,
    anchor: "start",
  }));

  // Flip labels to left if they'd go off right edge
  labels.forEach(l => {
    if (l.x + l.w > dims.w - 10) {
      l.x = l.ox - l.w - 5;
      l.anchor = "end";
    }
  });

  // Iterative solver: push apart overlapping labels in both X and Y, with spring
  for (let iter = 0; iter < 120; iter++) {
    let moved = false;
    for (let i = 0; i < labels.length; i++) {
      for (let j = i + 1; j < labels.length; j++) {
        const a = labels[i], b = labels[j];
        const aCx = a.x + a.w / 2, bCx = b.x + b.w / 2;
        const dx = Math.abs(aCx - bCx), dy = Math.abs(a.y - b.y);
        const minX = (a.w + b.w) / 2 + 2;
        const minY = (a.h + b.h) / 2 + 1;
        if (dx < minX && dy < minY) {
          // Push in the direction of least overlap
          const overlapX = minX - dx, overlapY = minY - dy;
          if (overlapY <= overlapX) {
            const py = overlapY / 2 + 0.3;
            if (a.y < b.y) { a.y -= py; b.y += py; }
            else { a.y += py; b.y -= py; }
          } else {
            const px = overlapX / 2 + 0.3;
            if (aCx < bCx) { a.x -= px; b.x += px; }
            else { a.x += px; b.x -= px; }
          }
          moved = true;
        }
      }
    }
    // Spring: pull back toward origin
    for (let i = 0; i < labels.length; i++) {
      const l = labels[i];
      const driftY = l.y - l.oy;
      const driftX = l.x - (l.anchor === "end" ? l.ox - l.w - 5 : l.ox + 7);
      if (Math.abs(driftY) > 0.5) l.y -= driftY * 0.08;
      if (Math.abs(driftX) > 0.5) l.x -= driftX * 0.08;
    }
    if (!moved) break;
  }

  // Clamp: keep labels on screen and limit max drift
  labels.forEach(l => {
    const maxDriftY = 70, maxDriftX = 60;
    l.y = Math.max(l.oy - maxDriftY, Math.min(l.oy + maxDriftY, l.y));
    const homeX = l.anchor === "end" ? l.ox - l.w - 5 : l.ox + 7;
    l.x = Math.max(homeX - maxDriftX, Math.min(homeX + maxDriftX, l.x));
    l.y = Math.max(10, Math.min(dims.h - 6, l.y));
    l.x = Math.max(4, Math.min(dims.w - l.w - 4, l.x));
    // Compute drift distance for leader line
    l.drift = Math.sqrt((l.x + (l.anchor === "end" ? l.w : 0) - l.ox) ** 2 + (l.y - l.oy) ** 2);
  });

  const map = {};
  labels.forEach(l => map[l.id] = l);
  return map;
}

/* ── Main component ── */
function App() {
  const [field, setField] = useState("hos");
  const [books, setBooks] = useState([]);
  const [connections, setConnections] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selected, setSelected] = useState(null);
  const [hovered, setHovered] = useState(null);
  const [hovCur, setHovCur] = useState(null);
  const [activeCur, setActiveCur] = useState(null);
  const [showConns, setShowConns] = useState(true);
  const [showWaves, setShowWaves] = useState(true);
  const containerRef = useRef(null);
  const [dims, setDims] = useState({ w: window.innerWidth, h: 750 });
  const [panelPos, setPanelPos] = useState(null);
  const dragRef = useRef(null);
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const cfg = FIELDS[field];
  const CURRENTS = cfg.currents;
  const WAVES = cfg.waves;

  /* ── Load CSVs (re-fetch when field changes) ── */
  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    setSelected(null);
    setPanelPos(null);
    setActiveCur(null);
    setHovCur(null);
    async function load() {
      try {
        const [bRes, cRes] = await Promise.all([
          fetch(cfg.booksFile + "?v=" + Date.now()).then(r => { if (!r.ok) throw new Error(cfg.booksFile + " not found"); return r.text(); }),
          fetch(cfg.connsFile + "?v=" + Date.now()).then(r => { if (!r.ok) throw new Error(cfg.connsFile + " not found"); return r.text(); }),
        ]);
        if (cancelled) return;
        const bParsed = Papa.parse(bRes, { header: true, skipEmptyLines: true });
        const cParsed = Papa.parse(cRes, { header: true, skipEmptyLines: true });
        const bks = bParsed.data.map(r => ({
          id: parseInt(r.id),
          a: r.author,
          fn: r.full_name || r.author,
          t: r.title,
          yr: parseInt(r.year_published),
          h0: parseInt(r.hist_start),
          h1: parseInt(r.hist_end),
          geo: (r.geography || "global").split("|")[0].trim(),
          cur: (r.currents || "").split("|").map(s => s.trim()).filter(Boolean),
          d: r.description || "",
        }));
        const cns = cParsed.data.map(r => [parseInt(r.source_id), parseInt(r.target_id), r.label || ""]);
        setBooks(bks);
        setConnections(cns);
        setLoading(false);
      } catch (e) {
        if (!cancelled) setError(e.message);
        setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, [field, cfg.booksFile, cfg.connsFile]);

  useEffect(() => {
    const obs = new ResizeObserver(entries => {
      for (const e of entries) setDims({ w: e.contentRect.width, h: Math.max(650, e.contentRect.height) });
    });
    if (containerRef.current) obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  /* ── Drag handlers for detail panel (mouse + touch) ── */
  useEffect(() => {
    const getXY = (e) => e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
    const onMove = (e) => {
      if (!dragRef.current) return;
      const { startX, startY, origX, origY } = dragRef.current;
      const pt = getXY(e);
      setPanelPos({ x: origX + pt.x - startX, y: origY + pt.y - startY });
    };
    const onUp = () => { dragRef.current = null; };
    const onKey = (e) => { if (e.key === "Escape") { setSelected(null); setPanelPos(null); } };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchmove", onMove, { passive: true });
    window.addEventListener("touchend", onUp);
    window.addEventListener("keydown", onKey);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
      window.removeEventListener("keydown", onKey);
    };
  }, []);
  const onPanelMouseDown = (e) => {
    if (e.target.tagName === "BUTTON") return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pt = e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
    dragRef.current = { startX: pt.x, startY: pt.y, origX: rect.left, origY: rect.top };
    e.preventDefault();
  };

  const m = isMobile ? { top: 14, right: 6, bottom: 45, left: 44 } : { top: 20, right: 10, bottom: 55, left: 60 };
  const pw = dims.w - m.left - m.right;
  const ph = dims.h - m.top - m.bottom;

  /* ── Density-proportional y-axis using 50-year bins ── */
  const yBinSize = 50;
  const yBins = useMemo(() => {
    const counts = {};
    books.forEach(b => {
      const mid = (b.h0 + b.h1) / 2;
      const bs = Math.floor(mid / yBinSize) * yBinSize;
      counts[bs] = (counts[bs] || 0) + 1;
    });
    const binStarts = Object.keys(counts).map(Number).sort((a, b) => a - b);
    if (binStarts.length === 0) return [];
    const allBins = [];
    for (let s = binStarts[0]; s <= binStarts[binStarts.length - 1]; s += yBinSize) {
      allBins.push({ start: s, count: counts[s] || 0 });
    }
    const minWeight = 1;
    const totalWeight = allBins.reduce((s, b) => s + Math.max(minWeight, b.count), 0);
    const padTop = 10, padBot = 10;
    const usable = ph - padTop - padBot;
    let cum = 0;
    allBins.forEach(bin => {
      const w = Math.max(minWeight, bin.count);
      bin.py1 = m.top + padTop + ph - padBot - (cum / totalWeight) * usable;
      cum += w;
      bin.py0 = m.top + padTop + ph - padBot - (cum / totalWeight) * usable;
    });
    return allBins;
  }, [books, m.top, ph]);

  const yScale = useCallback(v => {
    if (yBins.length === 0) return m.top;
    const bs = Math.floor(v / yBinSize) * yBinSize;
    const bin = yBins.find(b => b.start === bs);
    if (!bin) {
      if (v < yBins[0].start) return yBins[0].py1;
      return yBins[yBins.length - 1].py0;
    }
    const t = (v - bin.start) / yBinSize;
    return bin.py1 + t * (bin.py0 - bin.py1);
  }, [yBins, m.top]);

  /* ── Density-proportional x-axis using 5-year bins ── */
  const binSize = 5;
  const xBins = useMemo(() => {
    const counts = {};
    books.forEach(b => {
      const bs = Math.floor(b.yr / binSize) * binSize;
      counts[bs] = (counts[bs] || 0) + 1;
    });
    const binStarts = Object.keys(counts).map(Number).sort((a, b) => a - b);
    if (binStarts.length === 0) return [];
    const allBins = [];
    const firstBin = 1960;
    for (let s = firstBin; s <= binStarts[binStarts.length - 1]; s += binSize) {
      allBins.push({ start: s, count: counts[s] || 0 });
    }
    const minWeight = 1;
    const totalWeight = allBins.reduce((s, b) => s + Math.max(minWeight, b.count), 0);
    const padLeft = 0;
    const padRight = 40;
    const usable = pw - padLeft - padRight;
    let cum = 0;
    allBins.forEach(bin => {
      const w = Math.max(minWeight, bin.count);
      bin.x0 = m.left + padLeft + (cum / totalWeight) * usable;
      cum += w;
      bin.x1 = m.left + padLeft + (cum / totalWeight) * usable;
    });
    return allBins;
  }, [books, m.left, pw]);

  const xScale = useCallback(yr => {
    if (xBins.length === 0) return m.left;
    const bs = Math.floor(yr / binSize) * binSize;
    const bin = xBins.find(b => b.start === bs);
    if (!bin) {
      if (yr < xBins[0].start) return xBins[0].x0;
      return xBins[xBins.length - 1].x1;
    }
    const pad = (bin.x1 - bin.x0) * 0.1;
    const inner = (bin.x1 - bin.x0) - pad * 2;
    const t = binSize <= 1 ? 0.5 : (yr - bin.start) / (binSize - 1);
    return bin.x0 + pad + t * inner;
  }, [xBins, m.left]);

  const positions = useMemo(() => {
    const pos = {};
    const grid = {};
    books.forEach(b => {
      let x = xScale(b.yr);
      let y = yScale((b.h0 + b.h1) / 2);
      const gk = `${Math.round(x / 28)}-${Math.round(y / 22)}`;
      if (!grid[gk]) grid[gk] = 0;
      const n = grid[gk]; grid[gk]++;
      x += (n % 3 - 1) * 16;
      y += Math.floor(n / 3) * 18;
      pos[b.id] = { x, y };
    });
    return pos;
  }, [books, xScale, yScale]);

  const labelPositions = useMemo(() => {
    const nodes = books.map(b => ({ id: b.id, a: b.a, x: positions[b.id]?.x || 0, y: positions[b.id]?.y || 0 }));
    return solveLabels(nodes, dims);
  }, [books, positions, dims]);

  const selBook = selected ? books.find(b => b.id === selected) : null;
  const connIds = useMemo(() => {
    if (!selected) return new Set();
    const s = new Set();
    connections.forEach(([a, b]) => { if (a === selected) s.add(b); if (b === selected) s.add(a); });
    return s;
  }, [selected, connections]);

  const curFilter = activeCur || hovCur;
  const bookVisible = useCallback(b => !curFilter || b.cur.includes(curFilter), [curFilter]);

  const activeGeos = useMemo(() => {
    const s = new Set();
    books.forEach(b => s.add(b.geo));
    return [...s].sort();
  }, [books]);

  if (loading) return <div style={{ padding: 40, fontFamily: "sans-serif", color: "#888" }}>Loading CSV data…</div>;
  if (error) return <div style={{ padding: 40, fontFamily: "sans-serif", color: "#c00" }}>
    <strong>Error loading data:</strong> {error}<br/><br/>
    Make sure CSV files are in the data/ directory.
    If running locally, use a local server (<code>python -m http.server</code>).
  </div>;

  return (
    <div style={{ fontFamily: "'Libre Baskerville', Georgia, serif", background: "#faf8f4", color: "#2c2417", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');
        .nd { cursor: pointer; transition: all 0.2s; }
        .nd:hover { filter: brightness(1.15); }
        .cl { pointer-events: none; }
        .chip { cursor: pointer; padding: 4px 10px; font-family: 'DM Sans', sans-serif;
          font-size: 11px; font-weight: 500; border-radius: 2px; transition: all 0.2s;
          user-select: none; white-space: nowrap; display: inline-block; }
        @media (max-width: 767px) {
          .chip { padding: 5px 8px; font-size: 10px; }
          .tag { font-size: 8.5px !important; padding: 2px 5px !important; }
        }
        .ctrl { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #9a8b78;
          cursor: pointer; display: inline-flex; align-items: center; gap: 4px; user-select: none; }
        .dp { background: #fff; border: 1px solid #d4c9b8; padding: 20px 24px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.06); max-width: 580px; margin: 0 auto 16px; }
        .ci { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 3px 0;
          cursor: pointer; }
        .ci:hover span:first-child { text-decoration: underline; }
        .tag { display: inline-block; padding: 2px 7px; border-radius: 2px; font-size: 9.5px;
          font-family: 'DM Sans', sans-serif; margin: 2px; color: #fff; }
        .tab { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
          padding: 6px 16px; cursor: pointer; border: none; border-bottom: 2px solid transparent;
          background: none; color: #9a8b78; transition: all 0.2s; }
        .tab:hover { color: #5c4a32; }
        .tab.active { color: #2c2417; border-bottom-color: #2c2417; }
      `}</style>

      {/* ── Header ── */}
      <div style={{ padding: isMobile ? "10px 12px 0" : "14px 20px 0", borderBottom: "1px solid #d4c9b8", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: isMobile ? 4 : 8 }}>
          <h1 style={{ margin: 0, fontSize: isMobile ? 15 : 19, fontWeight: 700 }}>{cfg.title}</h1>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 0, marginBottom: -1, overflowX: "auto" }}>
          {Object.entries(FIELDS).map(([k, v]) => (
            <button key={k} className={`tab ${field === k ? "active" : ""}`}
              style={isMobile ? { fontSize: 11, padding: "5px 10px", whiteSpace: "nowrap" } : {}}
              onClick={() => setField(k)}>{v.label}</button>
          ))}
        </div>
      </div>

      {/* ── Filters ── */}
      <div style={{ padding: isMobile ? "6px 10px 5px" : "8px 20px 6px", borderBottom: "1px solid #d4c9b8", flexShrink: 0 }}>
        <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
          {activeCur && <button onClick={() => setActiveCur(null)} style={{
            fontFamily: "'DM Sans', sans-serif", fontSize: 10, padding: "2px 8px", background: "#5c4a32",
            color: "#faf8f4", border: "none", borderRadius: 2, cursor: "pointer" }}>Clear ×</button>}
        </div>

        {/* Current chips */}
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 4 }}>
          {Object.entries(CURRENTS).map(([k, { label, color }]) => {
            const on = activeCur === k, hov = hovCur === k;
            return <span key={k} className="chip"
              onClick={() => setActiveCur(on ? null : k)}
              onMouseEnter={() => setHovCur(k)} onMouseLeave={() => setHovCur(null)}
              style={{ background: on || hov ? color : "transparent", color: on || hov ? "#fff" : color,
                border: `1.5px solid ${color}`, opacity: curFilter && !on && !hov ? 0.35 : 1 }}>{label}</span>;
          })}
        </div>

        {/* Geography legend */}
        <div style={{ display: "flex", gap: isMobile ? 5 : 8, flexWrap: "wrap", marginTop: isMobile ? 4 : 6, alignItems: "center" }}>
          <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: isMobile ? 8.5 : 9.5, color: "#a09080", textTransform: "uppercase", letterSpacing: "0.5px" }}>Geography:</span>
          {activeGeos.map(g => GEO[g] && (
            <span key={g} style={{ display: "inline-flex", alignItems: "center", gap: 3, fontFamily: "'DM Sans', sans-serif", fontSize: isMobile ? 9 : 10.5, color: "#6b5d4f" }}>
              <span style={{ width: isMobile ? 6 : 8, height: isMobile ? 6 : 8, borderRadius: "50%", background: GEO[g].color, display: "inline-block" }}/>
              {GEO[g].label}
            </span>
          ))}
        </div>
      </div>

      {/* ── SVG ── */}
      <div ref={containerRef} style={{ width: "100%", flex: 1, minHeight: isMobile ? 400 : 480, overflowX: isMobile ? "auto" : "hidden", overflowY: "hidden", WebkitOverflowScrolling: "touch" }}>
        <svg width={isMobile ? Math.max(dims.w, 600) : dims.w} height={dims.h} style={{ display: "block" }}>

          {/* Grid */}
          {xBins.map((bin, i) => <g key={`xb${bin.start}`}>
            <line x1={bin.x0} x2={bin.x0} y1={m.top - 5} y2={dims.h - m.bottom} stroke="#ede6da" strokeWidth={0.5}/>
            {i === xBins.length - 1 && <line x1={bin.x1} x2={bin.x1} y1={m.top - 5} y2={dims.h - m.bottom} stroke="#ede6da" strokeWidth={0.5}/>}
            <text x={(bin.x0 + bin.x1) / 2} y={dims.h - m.bottom + (isMobile ? 13 : 16)} textAnchor="middle"
              style={{ fontFamily: "'DM Sans', sans-serif", fontSize: isMobile ? 8 : 10, fill: "#b0a090" }}>
              {"'" + String(bin.start).slice(2)}
            </text>
          </g>)}
          {yBins.map((bin, i) => <g key={`yb${bin.start}`}>
            <line x1={m.left} x2={dims.w - m.right} y1={bin.py1} y2={bin.py1} stroke="#ede6da" strokeWidth={0.5}/>
            {i === yBins.length - 1 && <line x1={m.left} x2={dims.w - m.right} y1={bin.py0} y2={bin.py0} stroke="#ede6da" strokeWidth={0.5}/>}
            <text x={m.left - 4} y={(bin.py0 + bin.py1) / 2 + 3.5} textAnchor="end"
              style={{ fontFamily: "'DM Sans', sans-serif", fontSize: isMobile ? 8 : 10, fill: "#b0a090" }}>{bin.start}</text>
          </g>)}

          {/* Axis labels */}
          <text x={m.left + pw / 2} y={dims.h - (isMobile ? 3 : 6)} textAnchor="middle"
            style={{ fontFamily: "'DM Sans', sans-serif", fontSize: isMobile ? 9 : 10.5, fill: "#8b7a65", fontWeight: 500, letterSpacing: "1px" }}>
            YEAR PUBLISHED</text>
          <text x={isMobile ? 10 : 14} y={m.top + ph / 2} textAnchor="middle" transform={`rotate(-90, ${isMobile ? 10 : 14}, ${m.top + ph / 2})`}
            style={{ fontFamily: "'DM Sans', sans-serif", fontSize: isMobile ? 9 : 10.5, fill: "#8b7a65", fontWeight: 500, letterSpacing: "1px" }}>
            HISTORICAL PERIOD</text>

          {/* Waves */}
          {showWaves && WAVES.map((w, i) => <g key={i} opacity={0.06}>
            <rect x={xScale(w.y0)} y={m.top} width={xScale(w.y1) - xScale(w.y0)} height={ph} fill={w.color}/>
          </g>)}

          {/* Range bars */}
          {books.map(b => {
            const p = positions[b.id]; if (!p) return null;
            const vis = bookVisible(b);
            const act = !selected || selected === b.id || connIds.has(b.id);
            return <line key={`r${b.id}`} x1={p.x} x2={p.x} y1={yScale(b.h0)} y2={yScale(b.h1)}
              stroke={GEO[b.geo]?.color || "#999"} strokeWidth={1.5} opacity={vis && act ? 0.2 : 0.03}/>;
          })}

          {/* Connections */}
          {showConns && connections.map(([aId, bId, label], i) => {
            const pA = positions[aId], pB = positions[bId];
            if (!pA || !pB) return null;
            const sa = selected ? (aId === selected || bId === selected) : false;
            const bA = books.find(b => b.id === aId), bB = books.find(b => b.id === bId);
            const ca = curFilter && bA && bB ? (bA.cur.includes(curFilter) && bB.cur.includes(curFilter)) : false;
            const op = selected ? (sa ? 0.4 : 0.01) : (curFilter ? (ca ? 0.3 : 0.01) : 0.035);
            return <line key={i} className="cl" x1={pA.x} y1={pA.y} x2={pB.x} y2={pB.y}
              stroke={sa ? "#3c3226" : "#b0a090"} strokeWidth={sa ? 1.5 : 0.6} opacity={op}/>;
          })}

          {/* Nodes + labels */}
          {books.map(b => {
            const p = positions[b.id]; if (!p) return null;
            const lp = labelPositions[b.id];
            const isSel = selected === b.id;
            const isHov = hovered === b.id;
            const isConn = connIds.has(b.id);
            const vis = bookVisible(b);
            const act = (!selected || isSel || isConn) && vis;
            const gc = GEO[b.geo]?.color || "#888";
            const r = isMobile
              ? (isSel ? 8 : isConn ? 6.5 : 5.5)
              : (isSel ? 7 : isConn ? 5.5 : isHov ? 5 : 4);
            const labelEndX = lp ? (lp.anchor === "end" ? lp.x : lp.x) : 0;
            const showLeader = lp && lp.drift > 18;
            return <g key={b.id} className="nd"
              onClick={() => { setSelected(isSel ? null : b.id); setPanelPos(null); }}
              onMouseEnter={() => setHovered(b.id)} onMouseLeave={() => setHovered(null)}>
              <circle cx={p.x} cy={p.y} r={r + (isMobile ? 10 : 5)} fill="transparent"/>
              {isSel && <circle cx={p.x} cy={p.y} r={r + 3} fill={gc} opacity={0.14}/>}
              {showLeader && !isMobile && <line x1={p.x} y1={p.y} x2={lp.anchor === "end" ? lp.x + lp.w : lp.x} y2={lp.y}
                stroke="#d4c9b8" strokeWidth={0.5} opacity={act ? 0.4 : 0.08}/>}
              <circle cx={p.x} cy={p.y} r={r} fill={gc}
                stroke={isSel ? "#2c2417" : "none"} strokeWidth={2} opacity={act ? 1 : 0.1}/>
              {lp && !isMobile && <text x={lp.x} y={lp.y + 3}
                textAnchor={lp.anchor === "end" ? "end" : "start"}
                style={{ fontFamily: "'DM Sans', sans-serif", fontSize: isSel || isHov ? 10 : 8,
                  fontWeight: isSel || isHov ? 600 : 400, fill: act ? "#2c2417" : "#d4c9b8",
                  pointerEvents: "none",
                  ...(isHov ? { paintOrder: "stroke", stroke: "#faf8f4", strokeWidth: 3 } : {})
                }}>{b.a}</text>}
              {isMobile && isSel && lp && <text x={p.x} y={p.y - 10}
                textAnchor="middle"
                style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 9, fontWeight: 600,
                  fill: "#2c2417", pointerEvents: "none",
                  paintOrder: "stroke", stroke: "#faf8f4", strokeWidth: 3 }}>{b.a}</text>}
            </g>;
          })}
        </svg>
      </div>

      {/* ── Detail panel ── */}
      {selBook && (() => {
        const p = positions[selBook.id];
        if (!p) return null;

        /* Mobile: bottom sheet with overlay */
        if (isMobile) {
          return <>
            <div onClick={() => { setSelected(null); setPanelPos(null); }} style={{
              position: "fixed", inset: 0, background: "rgba(0,0,0,0.25)", zIndex: 9 }}/>
            <div className="dp" onTouchStart={onPanelMouseDown} style={{
              position: "fixed", left: 0, right: 0, bottom: 0, zIndex: 10,
              background: "#fff", borderTop: "1px solid #d4c9b8", padding: "14px 16px 20px",
              boxShadow: "0 -4px 20px rgba(0,0,0,0.12)", maxHeight: "55vh", overflowY: "auto",
              borderRadius: "12px 12px 0 0",
            }}>
              <div style={{ width: 36, height: 4, background: "#d4c9b8", borderRadius: 2, margin: "0 auto 10px" }}/>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <div>
                  <h2 style={{ margin: 0, fontSize: 14, lineHeight: 1.3 }}>{selBook.fn}, <em>{selBook.t}</em></h2>
                  <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#8b7a65", margin: "3px 0" }}>
                    Published {selBook.yr} · Covers {selBook.h0}–{selBook.h1} ·&nbsp;
                    <span style={{ color: GEO[selBook.geo]?.color }}>{GEO[selBook.geo]?.label || selBook.geo}</span>
                  </p>
                </div>
                <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 22, color: "#b0a090", lineHeight: 1 }}>×</button>
              </div>
              <p style={{ fontSize: 12.5, lineHeight: 1.55, margin: "8px 0" }}>{selBook.d}</p>
              <div>{selBook.cur.map(c => <span key={c} className="tag" style={{ background: CURRENTS[c]?.color || "#888" }}>{CURRENTS[c]?.label || c}</span>)}</div>
              {connIds.size > 0 && <div style={{ borderTop: "1px solid #e8dfd2", marginTop: 10, paddingTop: 8 }}>
                <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 9.5, color: "#9a8b78", margin: "0 0 4px", textTransform: "uppercase", letterSpacing: "0.5px", fontWeight: 600 }}>Connections</p>
                {connections.filter(([a, b]) => a === selected || b === selected).map(([a, b, label], i) => {
                  const oId = a === selected ? b : a;
                  const o = books.find(bk => bk.id === oId);
                  if (!o) return null;
                  return <div key={i} className="ci" onClick={() => setSelected(oId)} style={{ color: "#6b5d4f" }}>
                    <span style={{ color: GEO[o.geo]?.color, fontWeight: 600 }}>{o.a}</span>
                    <span style={{ color: "#b0a090" }}> — {label}</span>
                  </div>;
                })}
              </div>}
            </div>
          </>;
        }

        /* Desktop: floating draggable panel near dot */
        const panelW = 420, panelH = 280;
        const gap = 18;
        let left = p.x + gap;
        if (left + panelW > dims.w - 20) left = p.x - panelW - gap;
        const headerH = containerRef.current ? containerRef.current.getBoundingClientRect().top : 0;
        let top = p.y - panelH / 2 + headerH;
        top = Math.max(headerH + 8, Math.min(top, headerH + dims.h - panelH - 8));
        const finalLeft = panelPos ? panelPos.x : left;
        const finalTop = panelPos ? panelPos.y : top;
        return <div className="dp" onMouseDown={onPanelMouseDown} style={{
          position: "fixed", left: finalLeft, top: finalTop, width: panelW, zIndex: 10,
          background: "#fff", border: "1px solid #d4c9b8", padding: "16px 18px",
          boxShadow: "0 4px 20px rgba(0,0,0,0.1)", maxHeight: panelH, overflowY: "auto",
          cursor: "grab", userSelect: "none",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <div>
              <h2 style={{ margin: 0, fontSize: 14, lineHeight: 1.3 }}>{selBook.fn}, <em>{selBook.t}</em></h2>
              <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#8b7a65", margin: "3px 0" }}>
                Published {selBook.yr} · Covers {selBook.h0}–{selBook.h1} ·&nbsp;
                <span style={{ color: GEO[selBook.geo]?.color }}>{GEO[selBook.geo]?.label || selBook.geo}</span>
              </p>
            </div>
            <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 20, color: "#b0a090", lineHeight: 1 }}>×</button>
          </div>
          <p style={{ fontSize: 12.5, lineHeight: 1.55, margin: "8px 0" }}>{selBook.d}</p>
          <div>{selBook.cur.map(c => <span key={c} className="tag" style={{ background: CURRENTS[c]?.color || "#888" }}>{CURRENTS[c]?.label || c}</span>)}</div>
          {connIds.size > 0 && <div style={{ borderTop: "1px solid #e8dfd2", marginTop: 10, paddingTop: 8 }}>
            <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 9.5, color: "#9a8b78", margin: "0 0 4px", textTransform: "uppercase", letterSpacing: "0.5px", fontWeight: 600 }}>Connections</p>
            {connections.filter(([a, b]) => a === selected || b === selected).map(([a, b, label], i) => {
              const oId = a === selected ? b : a;
              const o = books.find(bk => bk.id === oId);
              if (!o) return null;
              return <div key={i} className="ci" onClick={() => setSelected(oId)} style={{ color: "#6b5d4f" }}>
                <span style={{ color: GEO[o.geo]?.color, fontWeight: 600 }}>{o.a}</span>
                <span style={{ color: "#b0a090" }}> — {label}</span>
              </div>;
            })}
          </div>}
        </div>;
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
